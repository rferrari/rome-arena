<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ragdoll viewer</title>
  <style>html,body{margin:0;height:100%;background:#20242b;overflow:hidden}</style>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.169.0/build/three.module.js" } }
  </script>
</head>
<body>
  <script type="module">
    // Standalone close-up of a few jointed ragdolls to verify they look human.
    import * as THREE from 'three';
    import { createArena } from '/physics/arena_api.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20242b);
    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 2.2, 7); camera.lookAt(0, 0.6, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight); document.body.appendChild(renderer.domElement);
    scene.add(new THREE.HemisphereLight(0xffffff, 0x445, 1.2));
    const sun = new THREE.DirectionalLight(0xfff2dd, 1.4); sun.position.set(4, 8, 5); scene.add(sun);
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), new THREE.MeshStandardMaterial({ color: 0x5d6b45 }));
    ground.rotation.x = -Math.PI / 2; scene.add(ground);

    const arena = await createArena({ maxBodies: 4000 });
    arena.createGround(200, 140);
    arena.setRagdollParams(6, 999);
    for (let i = 0; i < 5; i++) arena.spawnRagdoll(i * 1.6 - 3.2, 2.2, 0, (Math.random() - 0.5) * 2, 1, 0);

    const mesh = new THREE.InstancedMesh(
      new THREE.CapsuleGeometry(1, 2, 6, 12),
      new THREE.MeshStandardMaterial({ color: 0x8a5a3a, roughness: 0.9 }), 6 * 14);
    scene.add(mesh);
    const dummy = new THREE.Object3D();
    let t = 0;
    (function frame() {
      arena.step(1 / 60, 4); t++;
      const xf = arena.transforms, ST = arena.XF_STRIDE, n = arena.count;
      let k = 0;
      for (let h = 0; h < n; h++) {
        const b = h * ST; if (xf[b + 7] !== 5) continue;
        dummy.position.set(xf[b], xf[b + 1], xf[b + 2]);
        dummy.quaternion.set(xf[b + 3], xf[b + 4], xf[b + 5], xf[b + 6]);
        dummy.scale.set(xf[b + 8], xf[b + 9], xf[b + 10]);
        dummy.updateMatrix(); mesh.setMatrixAt(k++, dummy.matrix);
      }
      dummy.scale.setScalar(0); dummy.updateMatrix();
      for (let i = k; i < mesh.count; i++) mesh.setMatrixAt(i, dummy.matrix);
      mesh.instanceMatrix.needsUpdate = true;
      renderer.render(scene, camera);
      requestAnimationFrame(frame);
      window.__BONES__ = k;
    })();
  </script>
</body>
</html>
